spring.application.name=smart-employee-management-system
server.port=8080

# ===== MySQL =====
spring.datasource.url=jdbc:mysql://localhost:3306/sems_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=NewPassword123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== File upload =====
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads

# ===== JWT =====
app.jwt.secret=ZmQ4MmYzM2Y5YjQwNDQxYzg1ZGUyMmZkY2Y4OWE4ZjJjMTQwOWY3NDdkM2I0YzM5NjQ1ZWE2OWE3OWNiMmFiYw==
app.jwt.expiration-ms=86400000

# ===== Logging =====
logging.level.org.springframework.security=INFO
logging.level.com.sems=DEBUG
logging.file.name=logs/sems.log

# ===== Swagger =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Static
spring.web.resources.static-locations=classpath:/static/,file:./uploads/
