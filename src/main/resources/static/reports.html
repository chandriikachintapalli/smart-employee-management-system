<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SEMS · Reports</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/style.css" rel="stylesheet">
</head><body>
<div id="root"></div>
<script src="/js/app.js"></script>
<script>
if (!requireAuth()){} else {
  document.getElementById('root').innerHTML = renderShell('reports');
  document.getElementById('main').innerHTML = topbar('Reports') + `
    <div class="card">
      <h3>Employee Reports</h3>
      <p class="text-muted">Export the full employee directory.</p>
      <button class="btn btn-primary me-2" onclick="dl('pdf')">⬇️ Export PDF</button>
      <button class="btn btn-outline-primary" onclick="dl('excel')">⬇️ Export Excel</button>
    </div>`;
  window.dl = async (kind)=>{
    const url = kind==='pdf' ? '/api/reports/employees/pdf' : '/api/reports/employees/excel';
    const r = await fetch(url, { headers: { 'Authorization':'Bearer '+API.token() }});
    if (!r.ok){ alert('Failed'); return; }
    const blob = await r.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = kind==='pdf' ? 'employees.pdf' : 'employees.xlsx';
    a.click();
  };
}
</script></body></html>
