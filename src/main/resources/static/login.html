<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SEMS · Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Welcome back to <span class="brand">SEMS</span></h1>
    <p class="sub">Smart Employee Management System</p>
    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="form-control" id="username" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" required>
      </div>
      <button class="btn btn-primary w-100" type="submit">Sign in</button>
      <div id="err" class="text-danger small mt-3"></div>
    </form>
    <hr/>
    <small class="text-muted">
      Demo: <b>admin</b> / <b>Admin@123</b> &nbsp;·&nbsp; <b>employee</b> / <b>Employee@123</b>
    </small>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  document.getElementById('err').textContent='';
  try{
    const data = await API.post('/api/auth/login', {
      username: document.getElementById('username').value.trim(),
      password: document.getElementById('password').value
    });
    API.setAuth(data.token, data.username, data.role);
    location.href = '/dashboard.html';
  }catch(err){ document.getElementById('err').textContent = err.message; }
});
if (API.token()) location.href='/dashboard.html';
</script>
</body>
</html>
