<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SEMS · Leaves</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/style.css" rel="stylesheet">
</head><body>
<div id="root"></div>
<script src="/js/app.js"></script>
<script>
if (!requireAuth()){} else {
  const isAdmin = API.user().role==='ADMIN';
  document.getElementById('root').innerHTML = renderShell('leaves');
  document.getElementById('main').innerHTML = topbar('Leave Management') + `
    <div class="card" id="applyCard">
      <h3>Apply for Leave</h3>
      <form id="lf" class="row g-2">
        <div class="col-md-3"><select id="type" class="form-select"><option>CASUAL</option><option>SICK</option><option>EARNED</option></select></div>
        <div class="col-md-3"><input type="date" id="start" class="form-control" required></div>
        <div class="col-md-3"><input type="date" id="end"   class="form-control" required></div>
        <div class="col-md-3 d-grid"><button class="btn btn-primary">Apply</button></div>
        <div class="col-12"><input id="reason" class="form-control" placeholder="Reason"></div>
      </form>
      <div id="err" class="text-danger small mt-2"></div>
    </div>
    <div class="card">
      <h3>${isAdmin?'All Leave Requests':'My Leave History'}</h3>
      <table class="table"><thead><tr>
        <th>ID</th><th>Employee</th><th>Type</th><th>From</th><th>To</th><th>Reason</th><th>Status</th>${isAdmin?'<th></th>':''}
      </tr></thead><tbody id="rows"></tbody></table>
    </div>`;
  let me=null;
  async function loadMe(){ try{ me = await API.get('/api/profile'); }catch{} }
  async function load(){
    let list;
    if (isAdmin){ list = await API.get('/api/leaves'); }
    else { if(!me) return; list = await API.get('/api/leaves/employee/'+me.id); }
    document.getElementById('rows').innerHTML = list.map(l=>`
      <tr><td>${l.id}</td><td>${l.employeeName||''}</td><td>${l.leaveType}</td>
      <td>${l.startDate}</td><td>${l.endDate}</td><td>${l.reason||''}</td>
      <td>${badgeStatus(l.status)}</td>
      ${isAdmin?`<td class="text-end">
        <button class="btn btn-sm btn-outline-success" onclick="setS(${l.id},'APPROVED')">Approve</button>
        <button class="btn btn-sm btn-outline-danger"  onclick="setS(${l.id},'REJECTED')">Reject</button>
      </td>`:''}</tr>`).join('') || `<tr><td colspan="8" class="text-center text-muted">No leaves</td></tr>`;
  }
  document.getElementById('lf').addEventListener('submit', async e=>{
    e.preventDefault(); document.getElementById('err').textContent='';
    if (!me) await loadMe();
    if (!me){ document.getElementById('err').textContent='Employee profile not found'; return; }
    try{
      await API.post('/api/leaves/employee/'+me.id, {
        leaveType:document.getElementById('type').value,
        startDate:document.getElementById('start').value,
        endDate:document.getElementById('end').value,
        reason:document.getElementById('reason').value
      });
      document.getElementById('lf').reset();
      load();
    }catch(err){ document.getElementById('err').textContent = err.message; }
  });
  window.setS = async (id,s)=>{ await API.patch('/api/leaves/'+id+'/status?status='+s); load(); };
  (async()=>{ await loadMe(); load(); })();
}
</script></body></html>
