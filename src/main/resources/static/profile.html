<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SEMS · Profile</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/style.css" rel="stylesheet">
</head><body>
<div id="root"></div>
<script src="/js/app.js"></script>
<script>
if (!requireAuth()){} else {
  document.getElementById('root').innerHTML = renderShell('profile');
  document.getElementById('main').innerHTML = topbar('My Profile') + `
    <div class="row g-3">
      <div class="col-lg-4">
        <div class="card text-center">
          <div class="avatar mx-auto mb-3" id="avatar"></div>
          <h4 id="name"></h4>
          <p class="text-muted" id="role"></p>
          <form id="pf"><input type="file" id="pic" accept="image/*" class="form-control mb-2">
          <button class="btn btn-primary w-100">Upload picture</button></form>
        </div>
      </div>
      <div class="col-lg-8">
        <div class="card">
          <h3>Update Profile</h3>
          <form id="uf" class="row g-2">
            <div class="col-md-6"><label class="form-label">First Name</label><input id="firstName" class="form-control"></div>
            <div class="col-md-6"><label class="form-label">Last Name</label><input id="lastName" class="form-control"></div>
            <div class="col-md-6"><label class="form-label">Phone</label><input id="phone" class="form-control"></div>
            <div class="col-md-6"><label class="form-label">Job Title</label><input id="jobTitle" class="form-control"></div>
            <div class="col-12"><button class="btn btn-primary">Save changes</button></div>
          </form>
        </div>
        <div class="card">
          <h3>Change Password</h3>
          <form id="cp" class="row g-2">
            <div class="col-md-6"><input type="password" id="cur" class="form-control" placeholder="Current password" required></div>
            <div class="col-md-6"><input type="password" id="nw" class="form-control" placeholder="New password (min 6)" required></div>
            <div class="col-12"><button class="btn btn-primary">Update password</button></div>
            <div id="cpMsg" class="small"></div>
          </form>
        </div>
      </div>
    </div>`;
  async function load(){
    const me = await API.get('/api/profile');
    document.getElementById('name').textContent = me.firstName+' '+me.lastName;
    document.getElementById('role').textContent = (me.jobTitle||'-') + ' · ' + (me.departmentName||'No dept');
    const av = document.getElementById('avatar');
    if (me.profilePicture) av.innerHTML = `<img src="${me.profilePicture}">`;
    else av.textContent = (me.firstName||'?').charAt(0).toUpperCase();
    document.getElementById('firstName').value = me.firstName||'';
    document.getElementById('lastName').value  = me.lastName||'';
    document.getElementById('phone').value     = me.phone||'';
    document.getElementById('jobTitle').value  = me.jobTitle||'';
  }
  document.getElementById('uf').addEventListener('submit', async e=>{
    e.preventDefault();
    await API.put('/api/profile', {
      firstName: document.getElementById('firstName').value,
      lastName:  document.getElementById('lastName').value,
      phone:     document.getElementById('phone').value,
      jobTitle:  document.getElementById('jobTitle').value,
    });
    load();
  });
  document.getElementById('cp').addEventListener('submit', async e=>{
    e.preventDefault();
    const msg = document.getElementById('cpMsg');
    msg.textContent=''; msg.className='small';
    try{
      await API.post('/api/profile/change-password', { currentPassword: cur.value, newPassword: nw.value });
      msg.textContent='Password updated.'; msg.classList.add('text-success');
      document.getElementById('cp').reset();
    }catch(err){ msg.textContent=err.message; msg.classList.add('text-danger'); }
  });
  document.getElementById('pf').addEventListener('submit', async e=>{
    e.preventDefault();
    const f = document.getElementById('pic').files[0];
    if (!f) return;
    const fd = new FormData(); fd.append('file', f);
    await API.req('POST','/api/profile/picture', fd, true);
    load();
  });
  load();
}
</script></body></html>
